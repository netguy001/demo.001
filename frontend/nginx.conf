server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Allow Google OAuth popup to communicate back
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # React Router — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # SEO: serve robots.txt and sitemap.xml directly
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }
    location = /sitemap.xml {
        access_log off;
        log_not_found off;
        add_header Content-Type "application/xml; charset=utf-8";
    }

    # Health check endpoint
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Static assets with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Web manifest
    location = /site.webmanifest {
        add_header Content-Type "application/manifest+json; charset=utf-8";
    }
}
