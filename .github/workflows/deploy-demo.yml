name: Deploy Demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # required to push images to GHCR

concurrency:
  group: deploy-demo-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # Image names unique to THIS repo (demo.001).
  # Existing alphasync-demo-backend/frontend are linked to netguy001/demo-alpha
  # and cannot be pushed to by this repo's GITHUB_TOKEN.
  # Local docker-compose tags (alphasync-demo-backend:latest) are unaffected —
  # they are applied via `docker tag` on the server after pull.
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/demo001-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/demo001-frontend

# ── Job 1a: Build & push backend image ──────────────────────────────────────
jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.demo
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=alphasync-demo-backend
          cache-to: type=gha,mode=max,scope=alphasync-demo-backend

# ── Job 1b: Build & push frontend image (parallel with backend) ──────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend assets
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          npm ci
          npm run build

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.demo.prebuilt
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=alphasync-demo-frontend
          cache-to: type=gha,mode=max,scope=alphasync-demo-frontend

# ── Job 2: Deploy (runs only after both builds succeed) ──────────────────────
  deploy:
    name: Deploy to Contabo
    runs-on: ubuntu-latest
    needs: [changes, build-backend, build-frontend]
    if: |
      always() &&
      needs.changes.result == 'success' &&
      (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
    timeout-minutes: 15
    # Job-level env so appleboy/ssh-action envs: can read them reliably.
    # (Step-level env: is NOT reliably visible to envs: in this action version.)
    env:
      BACKEND_IMAGE: ${{ format('ghcr.io/{0}/demo001-backend', github.repository_owner) }}
      FRONTEND_IMAGE: ${{ format('ghcr.io/{0}/demo001-frontend', github.repository_owner) }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_ACTOR: ${{ github.actor }}
      FAST2SMS_API_KEY: ${{ secrets.FAST2SMS_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      # Write Firebase credentials file — uploaded via SCP to avoid SSH quoting issues
      - name: Write Firebase credentials file
        run: |
          if [ -n "$FIREBASE_CREDS" ]; then
            printf '%s' "$FIREBASE_CREDS" > firebase-credentials.json
          else
            printf '{}' > firebase-credentials.json
            echo "WARNING: FIREBASE_CREDENTIALS_JSON secret not set — using empty credentials"
          fi
        env:
          FIREBASE_CREDS: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}

      # Upload only small config files (~5 KB total, not a giant image tarball)
      - name: Upload deploy assets to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "docker-compose.demo.yml,deploy/nginx/demo.alphasync.app.conf,firebase-credentials.json"
          target: "/opt/alphasync-demo"

      # Pull pre-built images from GHCR on server — only changed layers transferred
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          command_timeout: 12m
          envs: BACKEND_IMAGE,FRONTEND_IMAGE,GH_TOKEN,GH_ACTOR,FAST2SMS_API_KEY
          script: |
            set -eo pipefail
            DEPLOY_DIR="/opt/alphasync-demo"
            DOMAIN="demo.alphasync.app"

            echo "=== Preparing deploy directory ==="
            mkdir -p "${DEPLOY_DIR}"
            cd "${DEPLOY_DIR}"

            echo "=== Logging in to GHCR ==="
            echo "${GH_TOKEN}" | docker login ghcr.io -u "${GH_ACTOR}" --password-stdin

            echo "=== Pulling prebuilt images (only changed layers transferred) ==="
            docker pull "${BACKEND_IMAGE}:latest"
            docker pull "${FRONTEND_IMAGE}:latest"

            # Retag to local names expected by docker-compose.demo.yml
            docker tag "${BACKEND_IMAGE}:latest" alphasync-demo-backend:latest
            docker tag "${FRONTEND_IMAGE}:latest" alphasync-demo-frontend:latest

            echo "=== Verifying uploaded files ==="
            ls -la docker-compose.demo.yml deploy/nginx/demo.alphasync.app.conf || true
            test -f firebase-credentials.json && echo "Firebase credentials present" \
              || echo "WARNING: firebase-credentials.json missing"

            echo "=== Updating containers (no full teardown) ==="
            docker compose -p alphasync-demo -f docker-compose.demo.yml up -d --no-build --remove-orphans

            echo "=== Waiting for backend health (max 180s) ==="
            HEALTHY=0
            for i in $(seq 1 60); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' alphasync-demo-backend 2>/dev/null || echo "unknown")
              if [ "${STATUS}" = "healthy" ]; then
                echo "Backend healthy after $((i * 3))s!"
                HEALTHY=1
                break
              fi
              STATE=$(docker inspect --format='{{.State.Status}}' alphasync-demo-backend 2>/dev/null || echo "unknown")
              if [ "${STATE}" = "exited" ] || [ "${STATE}" = "dead" ]; then
                echo "ERROR: Backend container crashed. Last 100 log lines:"
                docker logs alphasync-demo-backend --tail 100 2>&1
                exit 1
              fi
              if [ "${STATUS}" = "unhealthy" ]; then
                echo "ERROR: Backend marked unhealthy. Last 100 log lines:"
                docker logs alphasync-demo-backend --tail 100 2>&1
                exit 1
              fi
              echo "  waiting... ($((i * 3))s elapsed, status=${STATUS} state=${STATE})"
              sleep 3
            done

            if [ "${HEALTHY}" -eq 0 ]; then
              echo "ERROR: Backend did not become healthy in 180s. Last 100 log lines:"
              docker logs alphasync-demo-backend --tail 100 2>&1
              exit 1
            fi

            echo "=== Installing Nginx config ==="
            NGINX_CONF="/etc/nginx/sites-enabled/${DOMAIN}.conf"
            cp deploy/nginx/demo.alphasync.app.conf "${NGINX_CONF}"

            mkdir -p /etc/nginx/ssl-certificates
            if [ ! -f "/etc/nginx/ssl-certificates/${DOMAIN}.crt" ]; then
              echo "Creating self-signed SSL cert..."
              openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
                -keyout "/etc/nginx/ssl-certificates/${DOMAIN}.key" \
                -out "/etc/nginx/ssl-certificates/${DOMAIN}.crt" \
                -subj "/CN=${DOMAIN}" 2>/dev/null
            fi

            if nginx -t 2>&1; then
              systemctl reload nginx
              echo "Nginx reloaded!"
            else
              echo "WARNING: Nginx config test failed — skipping reload"
            fi

            echo ""
            echo "=== Final status ==="
            docker compose -p alphasync-demo -f docker-compose.demo.yml ps
            docker ps --format "table {{.Names}}\t{{.Ports}}\t{{.Status}}"

            # Clean up dangling images in background
            docker image prune -f &>/dev/null &

            echo "Deploy complete! https://${DOMAIN}"
