# ============================================================
#  Nginx Reverse Proxy — demo.alphasync.app
#  CloudPanel vHost config
#
#  Traffic flow:
#    Client → CloudPanel Nginx (443)
#      → Frontend container (127.0.0.1:3001)
#        → /api, /ws, /uploads proxied to Backend (demo-backend:8000)
#
#  Place this file at:
#    /etc/nginx/sites-enabled/demo.alphasync.app.conf
#  Or configure via CloudPanel UI.
# ============================================================

# ── Rate limiting ────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=demo_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=demo_auth:10m    rate=5r/m;

# ── Upstream backends ────────────────────────────────────────
upstream demo_frontend {
    server 127.0.0.1:3001;
    keepalive 16;
}

upstream demo_backend {
    server 127.0.0.1:8001;
    keepalive 8;
}

# ── HTTP → HTTPS redirect ───────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name demo.alphasync.app;
    return 301 https://$host$request_uri;
}

# ── Main HTTPS server ───────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name demo.alphasync.app;

    # ── SSL (CloudPanel / Let's Encrypt manages these) ───────
    ssl_certificate     /etc/nginx/ssl-certificates/demo.alphasync.app.crt;
    ssl_certificate_key /etc/nginx/ssl-certificates/demo.alphasync.app.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:DEMO_SSL:10m;
    ssl_session_timeout 1d;

    # ── Security headers ─────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/javascript
        application/json application/javascript
        application/xml image/svg+xml;

    # ── Logging ──────────────────────────────────────────────
    access_log /var/log/nginx/demo.alphasync.app-access.log;
    error_log  /var/log/nginx/demo.alphasync.app-error.log;

    # ── Client limits ────────────────────────────────────────
    client_max_body_size 10M;

    # ── API routes (direct to backend, bypass frontend nginx) ─
    location /api/ {
        limit_req zone=demo_general burst=50 nodelay;

        proxy_pass http://demo_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;
    }

    # ── Auth endpoints (stricter rate limit) ─────────────────
    location /api/auth/ {
        limit_req zone=demo_auth burst=3 nodelay;

        proxy_pass http://demo_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout  30s;
    }

    # ── WebSocket (direct to backend) ────────────────────────
    location /ws/ {
        proxy_pass http://demo_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # ── Uploads (direct to backend) ──────────────────────────
    location /uploads/ {
        proxy_pass http://demo_backend;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Frontend (everything else) ───────────────────────────
    location / {
        limit_req zone=demo_general burst=50 nodelay;

        proxy_pass http://demo_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout  30s;
    }

    # ── Health check (no rate limit) ─────────────────────────
    location = /health {
        proxy_pass http://demo_frontend;
        access_log off;
    }

    location = /api/health {
        proxy_pass http://demo_backend;
        access_log off;
    }
}
