<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0;padding:0;background:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#0f172a;padding:40px 20px;">
<tr><td align="center">
<table width="600" cellpadding="0" cellspacing="0" style="background:#1e293b;border-radius:12px;border:1px solid rgba(148,163,184,0.1);">
  <tr><td style="padding:32px 40px 24px;">
    <div style="font-size:24px;font-weight:700;color:#f8fafc;margin-bottom:8px;">{{ title }}</div>
    <div style="width:48px;height:3px;background:linear-gradient(90deg,#00bcd4,#0097a7);border-radius:2px;margin-bottom:24px;"></div>
  </td></tr>
  <tr><td style="padding:0 40px 24px;">
    <p style="color:#e2e8f0;font-size:16px;line-height:1.6;margin:0 0 16px;">
      Hi <strong>{{ user_name }}</strong>,
    </p>
    <p style="color:#cbd5e1;font-size:15px;line-height:1.6;margin:0 0 24px;">
      {{ message }}
    </p>
    <table cellpadding="0" cellspacing="0" style="background:#0f172a;border-radius:8px;border:1px solid rgba(148,163,184,0.08);width:100%;margin-bottom:24px;">
      <tr>
        <td style="padding:16px 20px;color:#94a3b8;font-size:13px;">Access Duration</td>
        <td style="padding:16px 20px;color:#f8fafc;font-size:15px;font-weight:600;text-align:right;">{{ duration_days }} days</td>
      </tr>
      {% if expires_at %}
      <tr>
        <td style="padding:0 20px 16px;color:#94a3b8;font-size:13px;">Expires At</td>
        <td style="padding:0 20px 16px;color:#00bcd4;font-size:15px;font-weight:600;text-align:right;">{{ expires_at }}</td>
      </tr>
      {% endif %}
    </table>
    <a href="https://demo.alphasync.app" style="display:inline-block;background:linear-gradient(135deg,#00bcd4,#0097a7);color:#000;padding:12px 32px;border-radius:8px;text-decoration:none;font-weight:600;font-size:15px;">
      Go to AlphaSync
    </a>
  </td></tr>
  <tr><td style="padding:24px 40px;border-top:1px solid rgba(148,163,184,0.08);">
    <p style="color:#64748b;font-size:12px;margin:0;">
      — The AlphaSync Team<br>
      <span style="color:#475569;">This is an automated notification. Please do not reply.</span>
    </p>
  </td></tr>
</table>
</td></tr>
</table>
</body>
</html>
