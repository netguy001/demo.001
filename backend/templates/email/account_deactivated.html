<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0;padding:0;background:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#0f172a;padding:40px 20px;">
<tr><td align="center">
<table width="600" cellpadding="0" cellspacing="0" style="background:#1e293b;border-radius:12px;border:1px solid rgba(148,163,184,0.1);">
  <tr><td style="padding:32px 40px 24px;">
    <div style="font-size:24px;font-weight:700;color:#f8fafc;margin-bottom:8px;">{{ title }}</div>
    <div style="width:48px;height:3px;background:#ef4444;border-radius:2px;margin-bottom:24px;"></div>
  </td></tr>
  <tr><td style="padding:0 40px 24px;">
    <p style="color:#e2e8f0;font-size:16px;line-height:1.6;margin:0 0 16px;">
      Hi <strong>{{ user_name }}</strong>,
    </p>
    <p style="color:#cbd5e1;font-size:15px;line-height:1.6;margin:0 0 16px;">
      Your AlphaSync demo trading account has been <span style="color:#ef4444;font-weight:600;">deactivated</span>.
    </p>
    {% if reason %}
    <div style="background:#0f172a;border-radius:8px;border-left:3px solid #ef4444;padding:16px 20px;margin-bottom:24px;">
      <div style="color:#94a3b8;font-size:12px;margin-bottom:4px;">Reason</div>
      <div style="color:#e2e8f0;font-size:14px;">{{ reason }}</div>
    </div>
    {% endif %}
    <p style="color:#94a3b8;font-size:14px;">
      If you believe this is an error, please contact our support team.
    </p>
  </td></tr>
  <tr><td style="padding:24px 40px;border-top:1px solid rgba(148,163,184,0.08);">
    <p style="color:#64748b;font-size:12px;margin:0;">— The AlphaSync Team</p>
  </td></tr>
</table>
</td></tr>
</table>
</body>
</html>
